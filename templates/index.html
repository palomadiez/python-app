<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #10b981; /* Esmeralda */
            --bg-dark: #0f172a;      /* Azul pizarra muy oscuro */
            --card-bg: #1e293b;      /* Azul pizarra */
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .converter-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            background: var(--card-bg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            /* Responsivo: ancho completo en móvil, fijo en desktop */
            width: 100%;
            max-width: 450px;
            margin: 15px;
            transition: transform 0.3s ease;
        }

        h2 {
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--primary-color);
        }

        .form-label {
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            background-color: #334155;
            border: 1px solid #475569;
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus, .form-select:focus {
            background-color: #334155;
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .btn-convert {
            background-color: var(--primary-color);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 14px;
            transition: all 0.2s;
        }

        .btn-convert:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }

        .result-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary-color);
            animation: fadeIn 0.5s ease-out;
        }

        /* Icono de intercambio */
        .swap-icon {
            color: #94a3b8;
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajustes para pantallas pequeñas */
        @media (max-width: 576px) {
            .converter-card {
                padding: 2rem !important;
            }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>

<body>

    <div class="card p-4 p-md-5 converter-card">
        <h2 class="text-center mb-4">💱 Conversor</h2>

        <form method="post">
            <div class="mb-4">
                <label class="form-label text-uppercase">Cantidad a enviar</label>
                <input type="number" step="0.01" name="amount" 
                       class="form-control form-control-lg" 
                       placeholder="0.00" required>
            </div>

            <div class="row g-3 mb-4 align-items-center">
                <div class="col">
                    <label class="form-label d-block text-center">De</label>
                    <select name="from_currency" class="form-select text-center">
                        <option value="EUR">EUR €</option>
                        <option value="USD">USD $</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
                
                <div class="col-auto mt-4 swap-icon">
                    ⇄
                </div>

                <div class="col">
                    <label class="form-label d-block text-center">A</label>
                    <select name="to_currency" class="form-select text-center">
                        <option value="USD">USD $</option>
                        <option value="EUR">EUR €</option>
                        <option value="GBP">GBP £</option>
                    </select>
                </div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg btn-convert">
                    Convertir ahora
                </button>
            </div>
        </form>

        {% if result is not none %}
            <div class="mt-4 text-center result-box">
                {{ result }}
            </div>
        {% endif %}
    </div>

</body>
</html>
