<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">    <style>

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background-color: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.3rem;
        }

        .navbar img {
            width: 35px;
            margin-right: 10px;
        }

        /* CARD CONVERTER */

        .converter-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            max-width: 420px;
            margin: auto;
        }

        .result-box {
            font-size: 1.5rem;
            font-weight: bold;
            color: #198754;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
        }

    </style>
</head>

<body>

    <!-- NAVBAR MEJORADA -->
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <!-- LOGO -->
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png" alt="logo">
            Conversor
        </a>

        <div class="ms-auto">
            <a class="nav-link text-white" href="#">Inicio</a>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container main-container">

        <div class="card shadow-lg p-4 converter-card">

            <h2 class="text-center mb-4">💱 Conversor de Divisas</h2>

            <form method="post">

                <div class="row mb-3 align-items-center">

                    <div class="col">
                        <select name="from_currency" class="form-select">
                            <option value="EUR">EUR €</option>
                            <option value="USD">USD $</option>
                            <option value="GBP">GBP £</option>
                        </select>
                    </div>

                    <div class="col-2 text-center">
                        →
                    </div>

                    <div class="col">
                        <select name="to_currency" class="form-select">
                            <option value="USD">USD $</option>
                            <option value="EUR">EUR €</option>
                            <option value="GBP">GBP £</option>
                        </select>
                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.01" name="amount"
                           class="form-control form-control-lg"
                           placeholder="Introduce cantidad" required>
                </div>

                <div class="row mt-3">
                    <div class="col-6">
                        <button type="submit" class="btn btn-primary w-100">
                            Convertir
                        </button>
                    </div>

                    <div class="col-6">
                        <button type="reset" class="btn btn-danger w-100">
                            Eliminar
                        </button>
                    </div>
                </div>

            </form>

            {% if result is not none %}
                <div class="mt-4 text-center result-box">
                    {{ result }}
                </div>
            {% endif %}

        </div>

    </div>

</body>
</html>
