<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #10b981; /* Esmeralda */
            --bg-dark: #0f172a;      /* Azul pizarra muy oscuro */
            --card-bg: #1e293b;      /* Azul pizarra */
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .converter-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            background: var(--card-bg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            /* Responsivo: ancho completo en móvil, fijo en desktop */
            width: 100%;
            max-width: 450px;
            margin: 15px;
            transition: transform 0.3s ease;
        }

        h2 {
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--primary-color);
        }

        .form-label {
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            background-color: #334155;
            border: 1px solid #475569;
            color: white;
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus, .form-select:focus {
            background-color: #334155;
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .btn-convert {
            background-color: var(--primary-color);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 14px;
            transition: all 0.2s;
        }

        .btn-convert:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }

    <title>Conversor de Divisas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">    <style>

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background-color: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.3rem;
        }

        .navbar img {
            width: 35px;
            margin-right: 10px;
        }

        /* CARD CONVERTER */

        .converter-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            max-width: 420px;
            margin: auto;
        }

        .result-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--primary-color);
            border-radius: 16px;
            padding: 20px;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary-color);
            animation: fadeIn 0.5s ease-out;
        }

        /* Icono de intercambio */
        .swap-icon {
            color: #94a3b8;
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajustes para pantallas pequeñas */
        @media (max-width: 576px) {
            .converter-card {
                padding: 2rem !important;
            }
            h2 { font-size: 1.5rem; }
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
        }

    </style>
</head>

<body>        
    <!-- NAVBAR MEJORADA -->
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <!-- LOGO -->
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135706.png" alt="logo">
            Conversor
        </a>

        <div class="ms-auto">
            <a class="nav-link text-white" href="#">Inicio</a>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container main-container">

        <div class="card shadow-lg p-4 converter-card">

            <h2 class="text-center mb-4">💱 Conversor de Divisas</h2>

            <form method="post">

                <div class="row mb-3 align-items-center">

                    <div class="col">
                        <select name="from_currency" class="form-select">
                            <option value="EUR">EUR €</option>
                            <option value="USD">USD $</option>
                            <option value="GBP">GBP £</option>
                        </select>
                    </div>

                    <div class="col-2 text-center">
                        →
                    </div>

                    <div class="col">
                        <select name="to_currency" class="form-select">
                            <option value="USD">USD $</option>
                            <option value="EUR">EUR €</option>
                            <option value="GBP">GBP £</option>
                        </select>
                    </div>

                </div>

                <div class="mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" step="0.01" name="amount"
                           class="form-control form-control-lg"
                           placeholder="Introduce cantidad" required>
                </div>

                <div class="row mt-3">
                    <div class="col-6">
                        <button type="submit" class="btn btn-convert w-100">
                            Convertir
                        </button>
                    </div>

                    <div class="col-6">
                        <button type="reset" class="btn btn-danger w-100">
                            Eliminar
                        </button>
                    </div>
                </div>

            </form>

            {% if result is not none %}
                <div class="mt-4 text-center result-box">
                    {{ result }}
                </div>
            {% endif %}

        </div>

    </div>

</body>
</html>
